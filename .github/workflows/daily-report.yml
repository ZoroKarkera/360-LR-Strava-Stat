name: Daily Strava Report

on:
  workflow_dispatch:

  schedule:
    # 21:00 IST = 15:30 UTC
    - cron: "30 15 * * *"

env:
  ENABLE_GITHUB_PAGES: "true"   # Change to "true" to publish GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run Strava Report
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REDIRECT_URI: ${{ secrets.REDIRECT_URI }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}

        run: |
          python refresh_and_report.py --recipient "${{ secrets.SMTP_USER }}"

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: 360-Long-Runners-Report
          path: |
            reports/*.xlsx
            reports/*.html

      - name: Prepare GitHub Pages
        if: env.ENABLE_GITHUB_PAGES == 'true'
        run: |
          mkdir -p public

          latest=$(ls -t reports/360_Long_Runners_Dashboard_*.html | head -n1)

          echo "Publishing $latest"

          cp "$latest" public/index.html

      - name: Upload Pages Artifact
        if: env.ENABLE_GITHUB_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: ${{ vars.ENABLE_GITHUB_PAGES == 'true' || env.ENABLE_GITHUB_PAGES == 'true' }}
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
