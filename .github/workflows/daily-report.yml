name: Daily Strava Report

on:
  workflow_dispatch:
    inputs:
      send_email_to_club:
        description: "Send email to all club members"
        required: true
        default: true
        type: boolean

      deploy_pages:
        description: "Deploy GitHub Pages"
        required: true
        default: true
        type: boolean

  schedule:
    # 21:00 IST = 15:30 UTC
    - cron: "30 15 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Determine email recipients
        id: recipients
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "recipient=${{ secrets.EMAIL_RECIPIENTS }}" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.send_email_to_club }}" = "true" ]; then
            echo "recipient=${{ secrets.EMAIL_RECIPIENTS }}" >> $GITHUB_OUTPUT
          else
            echo "recipient=${{ secrets.SMTP_USER }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Strava Report
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          CLIENT_ID_APP2: ${{ secrets.CLIENT_ID_APP2 }}
          CLIENT_SECRET_APP2: ${{ secrets.CLIENT_SECRET_APP2 }}
          CLIENT_ID_APP3: ${{ secrets.CLIENT_ID_APP3 }}
          CLIENT_SECRET_APP3: ${{ secrets.CLIENT_SECRET_APP3 }}
          REDIRECT_URI: ${{ secrets.REDIRECT_URI }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}

        run: |
          python refresh_and_report.py \
            --recipient "${{ steps.recipients.outputs.recipient }}"

      - name: Upload Excel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: strava-excel-report
          path: reports/360_Long_Runners_Report.xlsx
          retention-days: 30

      - name: Upload HTML Artifact
        uses: actions/upload-artifact@v4
        with:
          name: strava-html-dashboard
          path: reports/360_Long_Runners_Dashboard.html
          retention-days: 30

      - name: Copy dashboard to repository root
        run: |
          cp reports/360_Long_Runners_Dashboard.html ./index.html

      - name: Configure GitHub Pages
        if: |
          github.event_name == 'schedule' ||
          inputs.deploy_pages == true
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: |
          github.event_name == 'schedule' ||
          inputs.deploy_pages == true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: |
          github.event_name == 'schedule' ||
          inputs.deploy_pages == true
        id: deployment
        uses: actions/deploy-pages@v4